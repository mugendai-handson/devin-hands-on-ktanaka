openapi: 3.1.0
info:
  title: devin-task-board API
  description: |
    リッチなタスク管理アプリ（Jira ミニ版）の REST API 仕様。

    - 認証方式: Auth.js v5（Credentials Provider）によるセッション Cookie
    - レスポンス形式:
      - 成功（単一）: `{ "data": T }`
      - 成功（一覧・ページネーション付き）: `{ "data": T[], "pagination": {...} }`
      - エラー: `{ "error": { "code": string, "message": string } }`
    - バリデーション: 全エンドポイントで zod スキーマを使用
    - 関連ドキュメント: `docs/spec.md`, `docs/user-stories.md`
  version: 0.1.0
  contact:
    name: devin-task-board
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: ローカル開発環境
  - url: https://example.com
    description: 本番環境（プレースホルダー）

tags:
  - name: Auth
    description: 認証（サインアップ・パスワードリセット）
  - name: Users
    description: ユーザープロフィール
  - name: Projects
    description: プロジェクト管理
  - name: ProjectMembers
    description: プロジェクトメンバーと権限管理
  - name: Tasks
    description: タスク管理（CRUD、D&D、サブタスク）
  - name: Comments
    description: コメント
  - name: Categories
    description: カテゴリ / ラベル
  - name: Attachments
    description: ファイル添付
  - name: Search
    description: グローバル検索
  - name: Activities
    description: アクティビティログ
  - name: Notifications
    description: 通知
  - name: Dashboard
    description: ダッシュボード
  - name: Admin
    description: 管理者向け（監査ログ）

security:
  - sessionCookie: []

paths:
  # ──────────────────────────────────────────────────────────────────
  # Auth
  # ──────────────────────────────────────────────────────────────────
  /api/auth/signup:
    post:
      tags: [Auth]
      summary: サインアップ
      description: メールアドレス・パスワードで新規ユーザーを作成する（US-01）。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: 既に登録済みのメールアドレス
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: パスワードリセット
      description: |
        メールアドレス宛にリセットリンクを送信する、またはトークンを使って新しい
        パスワードを設定する（US-03）。`token` が指定されていればパスワード再設定、
        指定されていなければリセットリンク送信を行う。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: リセットリンク送信成功またはパスワード更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────────────────────────
  # Users
  # ──────────────────────────────────────────────────────────────────
  /api/users/me:
    get:
      tags: [Users]
      summary: 自分のプロフィール取得（US-30）
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags: [Users]
      summary: プロフィール更新（US-30）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────────────────────────────────────────────────────────
  # Projects
  # ──────────────────────────────────────────────────────────────────
  /api/projects:
    get:
      tags: [Projects]
      summary: プロジェクト一覧（US-04）
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Projects]
      summary: プロジェクト作成（US-05）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/projects/{id}:
    parameters:
      - $ref: "#/components/parameters/ProjectIdParam"
    get:
      tags: [Projects]
      summary: プロジェクト詳細（US-04）
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Projects]
      summary: プロジェクト更新（US-06）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Projects]
      summary: プロジェクト削除（US-06、OWNER のみ）
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────────────────────────
  # Project Members
  # ──────────────────────────────────────────────────────────────────
  /api/projects/{id}/members:
    parameters:
      - $ref: "#/components/parameters/ProjectIdParam"
    get:
      tags: [ProjectMembers]
      summary: メンバー一覧（US-08）
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemberListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [ProjectMembers]
      summary: メンバー招待（US-07）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMemberRequest"
      responses:
        "201":
          description: 招待成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemberResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/projects/{id}/members/{memberId}:
    parameters:
      - $ref: "#/components/parameters/ProjectIdParam"
      - $ref: "#/components/parameters/MemberIdParam"
    patch:
      tags: [ProjectMembers]
      summary: メンバー権限変更（US-08）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemberResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [ProjectMembers]
      summary: メンバー削除（US-08、OWNER は自分自身削除不可）
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────────────────────────
  # Tasks
  # ──────────────────────────────────────────────────────────────────
  /api/projects/{id}/tasks:
    parameters:
      - $ref: "#/components/parameters/ProjectIdParam"
    get:
      tags: [Tasks]
      summary: タスク一覧（US-16）
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TaskStatus"
        - name: priority
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TaskPriority"
        - name: assigneeId
          in: query
          required: false
          schema:
            type: string
        - name: categoryId
          in: query
          required: false
          schema:
            type: string
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum: [taskNumber, title, status, priority, dueDate, createdAt, updatedAt]
        - name: sortOrder
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Tasks]
      summary: タスク作成（US-09）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/tasks/{taskId}:
    parameters:
      - $ref: "#/components/parameters/TaskIdParam"
    get:
      tags: [Tasks]
      summary: タスク詳細（US-10）
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Tasks]
      summary: タスク更新（US-10）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Tasks]
      summary: タスク削除（US-11、VIEWER 不可）
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/tasks/{taskId}/status:
    parameters:
      - $ref: "#/components/parameters/TaskIdParam"
    patch:
      tags: [Tasks]
      summary: ステータス変更（US-14、カンバン D&D 用）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskStatusRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/tasks/{taskId}/sort:
    parameters:
      - $ref: "#/components/parameters/TaskIdParam"
    patch:
      tags: [Tasks]
      summary: 並び順変更（US-14、カンバン D&D 用）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskSortRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/tasks/{taskId}/subtasks:
    parameters:
      - $ref: "#/components/parameters/TaskIdParam"
    get:
      tags: [Tasks]
      summary: サブタスク一覧（US-12）
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Tasks]
      summary: サブタスク作成（US-12）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubTaskRequest"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────────────────────────
  # Comments
  # ──────────────────────────────────────────────────────────────────
  /api/tasks/{taskId}/comments:
    parameters:
      - $ref: "#/components/parameters/TaskIdParam"
    get:
      tags: [Comments]
      summary: コメント一覧（US-19）
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Comments]
      summary: コメント投稿（US-19）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/comments/{commentId}:
    parameters:
      - $ref: "#/components/parameters/CommentIdParam"
    patch:
      tags: [Comments]
      summary: コメント編集（US-19、本人のみ）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommentRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Comments]
      summary: コメント削除（US-19、本人のみ）
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────────────────────────
  # Categories
  # ──────────────────────────────────────────────────────────────────
  /api/projects/{id}/categories:
    parameters:
      - $ref: "#/components/parameters/ProjectIdParam"
    get:
      tags: [Categories]
      summary: カテゴリ一覧（US-20）
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Categories]
      summary: カテゴリ作成（US-20）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/categories/{categoryId}:
    parameters:
      - $ref: "#/components/parameters/CategoryIdParam"
    patch:
      tags: [Categories]
      summary: カテゴリ更新（US-20）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryRequest"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Categories]
      summary: カテゴリ削除（US-20）
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────────────────────────
  # Attachments
  # ──────────────────────────────────────────────────────────────────
  /api/tasks/{taskId}/attachments:
    parameters:
      - $ref: "#/components/parameters/TaskIdParam"
    post:
      tags: [Attachments]
      summary: ファイルアップロード（US-21、上限10MB）
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: 画像 (jpg/png/gif/webp)、PDF、テキスト、Office
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          description: ファイルサイズ上限超過
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/attachments/{attachmentId}:
    parameters:
      - $ref: "#/components/parameters/AttachmentIdParam"
    delete:
      tags: [Attachments]
      summary: ファイル削除（US-21）
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────────────────────────
  # Search
  # ──────────────────────────────────────────────────────────────────
  /api/search:
    get:
      tags: [Search]
      summary: グローバル検索（US-22）
      parameters:
        - name: q
          in: query
          required: true
          description: 検索クエリ（タスクタイトル・説明・番号・コメントを対象）
          schema:
            type: string
            minLength: 1
        - name: projectId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TaskStatus"
        - name: priority
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TaskPriority"
        - name: assigneeId
          in: query
          required: false
          schema:
            type: string
        - name: categoryId
          in: query
          required: false
          schema:
            type: string
        - name: dueDateFrom
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: dueDateTo
          in: query
          required: false
          schema:
            type: string
            format: date
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────────────────────────────────────────────────────────
  # Activities
  # ──────────────────────────────────────────────────────────────────
  /api/tasks/{taskId}/activities:
    parameters:
      - $ref: "#/components/parameters/TaskIdParam"
    get:
      tags: [Activities]
      summary: タスクのアクティビティ一覧（US-23）
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityLogListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/projects/{id}/activities:
    parameters:
      - $ref: "#/components/parameters/ProjectIdParam"
    get:
      tags: [Activities]
      summary: プロジェクトのアクティビティフィード（US-24）
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityLogListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────────────────────────
  # Notifications
  # ──────────────────────────────────────────────────────────────────
  /api/notifications:
    get:
      tags: [Notifications]
      summary: 通知一覧（US-25）
      parameters:
        - name: isRead
          in: query
          required: false
          description: 既読フィルター（省略時は全件）
          schema:
            type: boolean
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/notifications/{id}/read:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    patch:
      tags: [Notifications]
      summary: 通知を既読にする（US-25）
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/notifications/read-all:
    patch:
      tags: [Notifications]
      summary: 通知を一括既読（US-25）
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkReadResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────────────────────────────────────────────────────────
  # Dashboard
  # ──────────────────────────────────────────────────────────────────
  /api/dashboard:
    get:
      tags: [Dashboard]
      summary: ダッシュボードデータ（US-18）
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────────────────────────────────────────────────────────
  # Admin
  # ──────────────────────────────────────────────────────────────────
  /api/admin/audit-logs:
    get:
      tags: [Admin]
      summary: 監査ログ一覧（US-29、ADMIN のみ）
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: string
        - name: action
          in: query
          required: false
          schema:
            type: string
        - name: dateFrom
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          required: false
          schema:
            type: string
            format: date
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  # ──────────────────────────────────────────────────────────────────
  # Security
  # ──────────────────────────────────────────────────────────────────
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: authjs.session-token
      description: |
        Auth.js v5（next-auth@5）が発行するセッション Cookie。
        `/api/auth/[...nextauth]` のサインイン完了時にブラウザへ自動設定される。
        HTTPS 環境では `__Secure-authjs.session-token` が使用される場合がある。

  # ──────────────────────────────────────────────────────────────────
  # Parameters
  # ──────────────────────────────────────────────────────────────────
  parameters:
    ProjectIdParam:
      name: id
      in: path
      required: true
      description: プロジェクト ID (cuid)
      schema:
        type: string
    MemberIdParam:
      name: memberId
      in: path
      required: true
      description: ProjectMember ID (cuid)
      schema:
        type: string
    TaskIdParam:
      name: taskId
      in: path
      required: true
      description: タスク ID (cuid)
      schema:
        type: string
    CommentIdParam:
      name: commentId
      in: path
      required: true
      description: コメント ID (cuid)
      schema:
        type: string
    CategoryIdParam:
      name: categoryId
      in: path
      required: true
      description: カテゴリ ID (cuid)
      schema:
        type: string
    AttachmentIdParam:
      name: attachmentId
      in: path
      required: true
      description: 添付ファイル ID (cuid)
      schema:
        type: string
    PageParam:
      name: page
      in: query
      required: false
      description: ページ番号（1 始まり）
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPageParam:
      name: perPage
      in: query
      required: false
      description: 1 ページあたり件数
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  # ──────────────────────────────────────────────────────────────────
  # Common responses
  # ──────────────────────────────────────────────────────────────────
  responses:
    BadRequest:
      description: バリデーションエラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            validation:
              value:
                error:
                  code: VALIDATION_ERROR
                  message: タイトルは必須です
    Unauthorized:
      description: 未認証
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            unauthorized:
              value:
                error:
                  code: UNAUTHORIZED
                  message: 認証が必要です
    Forbidden:
      description: 権限不足
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            forbidden:
              value:
                error:
                  code: FORBIDDEN
                  message: この操作を行う権限がありません
    NotFound:
      description: リソース未発見
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            notFound:
              value:
                error:
                  code: NOT_FOUND
                  message: リソースが見つかりません

  # ──────────────────────────────────────────────────────────────────
  # Schemas
  # ──────────────────────────────────────────────────────────────────
  schemas:
    # ----- Enums -----
    TaskStatus:
      type: string
      enum: [BACKLOG, TODO, IN_PROGRESS, IN_REVIEW, DONE]
    TaskPriority:
      type: string
      enum: [URGENT, HIGH, MEDIUM, LOW, NONE]
    UserRole:
      type: string
      enum: [ADMIN, MEMBER]
    ProjectMemberRole:
      type: string
      enum: [OWNER, ADMIN, MEMBER, VIEWER]
    Theme:
      type: string
      enum: [LIGHT, DARK, SYSTEM]
    ActivityAction:
      type: string
      enum: [CREATED, UPDATED, DELETED, STATUS_CHANGED, ASSIGNED, COMMENTED, ATTACHED]
    NotificationType:
      type: string
      enum:
        - TASK_ASSIGNED
        - TASK_COMMENTED
        - TASK_STATUS_CHANGED
        - TASK_DUE_SOON
        - MENTIONED

    # ----- Error / message -----
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: |
                エラーコード（例: `VALIDATION_ERROR`, `UNAUTHORIZED`,
                `FORBIDDEN`, `NOT_FOUND`, `CONFLICT`, `INTERNAL_ERROR`）
              examples: [VALIDATION_ERROR]
            message:
              type: string
              description: 人間可読なエラーメッセージ（日本語）

    MessageResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [message]
          properties:
            message:
              type: string

    Pagination:
      type: object
      required: [page, perPage, total, totalPages]
      properties:
        page:
          type: integer
          minimum: 1
        perPage:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0

    # ----- User -----
    User:
      type: object
      required: [id, email, name, role, locale, theme, createdAt, updatedAt]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        avatarUrl:
          type: [string, "null"]
        role:
          $ref: "#/components/schemas/UserRole"
        locale:
          type: string
          examples: [ja, en]
        theme:
          $ref: "#/components/schemas/Theme"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SignupRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    ResetPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        token:
          type: string
          description: リセットリンクに含まれるトークン。指定時は `newPassword` も必須。
        newPassword:
          type: string
          minLength: 8

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        avatarUrl:
          type: [string, "null"]
        locale:
          type: string
          enum: [ja, en]
        theme:
          $ref: "#/components/schemas/Theme"

    UserResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/User"

    # ----- Project -----
    Project:
      type: object
      required: [id, name, key, ownerId, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: [string, "null"]
        key:
          type: string
          description: "プロジェクトキー（例: `DTB`）"
        ownerId:
          type: string
        taskCount:
          type: integer
          minimum: 0
          description: プロジェクト内タスク数（一覧カード用サマリー）
        memberCount:
          type: integer
          minimum: 0
          description: プロジェクトメンバー数
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        key:
          type: string
          description: 省略時は `name` から自動生成
          pattern: "^[A-Z0-9]{2,10}$"

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: [string, "null"]

    ProjectResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Project"

    ProjectListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # ----- Project Member -----
    ProjectMember:
      type: object
      required: [id, projectId, userId, role, user, createdAt, updatedAt]
      properties:
        id:
          type: string
        projectId:
          type: string
        userId:
          type: string
        role:
          $ref: "#/components/schemas/ProjectMemberRole"
        user:
          $ref: "#/components/schemas/User"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    InviteMemberRequest:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [ADMIN, MEMBER, VIEWER]
          description: OWNER は招待時に指定不可

    UpdateMemberRequest:
      type: object
      required: [role]
      properties:
        role:
          $ref: "#/components/schemas/ProjectMemberRole"

    ProjectMemberResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/ProjectMember"

    ProjectMemberListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ProjectMember"

    # ----- Task -----
    Task:
      type: object
      required:
        - id
        - taskNumber
        - title
        - status
        - priority
        - projectId
        - reporterId
        - sortOrder
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        taskNumber:
          type: integer
          description: "プロジェクト内連番（例: 1 → `DTB-1`）"
        title:
          type: string
        description:
          type: [string, "null"]
          description: Markdown
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/TaskPriority"
        projectId:
          type: string
        assigneeId:
          type: [string, "null"]
        reporterId:
          type: string
        parentTaskId:
          type: [string, "null"]
        dueDate:
          type: [string, "null"]
          format: date-time
        startDate:
          type: [string, "null"]
          format: date-time
        estimatedHours:
          type: [number, "null"]
        actualHours:
          type: [number, "null"]
        sortOrder:
          type: integer
        assignee:
          $ref: "#/components/schemas/User"
        reporter:
          $ref: "#/components/schemas/User"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateTaskRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/TaskPriority"
        assigneeId:
          type: [string, "null"]
        dueDate:
          type: [string, "null"]
          format: date-time
        startDate:
          type: [string, "null"]
          format: date-time
        estimatedHours:
          type: [number, "null"]
        categoryIds:
          type: array
          items:
            type: string

    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: [string, "null"]
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/TaskPriority"
        assigneeId:
          type: [string, "null"]
        dueDate:
          type: [string, "null"]
          format: date-time
        startDate:
          type: [string, "null"]
          format: date-time
        estimatedHours:
          type: [number, "null"]
        actualHours:
          type: [number, "null"]
        categoryIds:
          type: array
          items:
            type: string

    UpdateTaskStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/TaskStatus"

    UpdateTaskSortRequest:
      type: object
      required: [sortOrder]
      properties:
        sortOrder:
          type: integer
        status:
          $ref: "#/components/schemas/TaskStatus"
          description: カラム間移動と同時に並び順も変更する場合に指定

    CreateSubTaskRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/TaskPriority"
        assigneeId:
          type: [string, "null"]
        dueDate:
          type: [string, "null"]
          format: date-time

    TaskResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Task"

    TaskListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # ----- Comment -----
    Comment:
      type: object
      required: [id, content, taskId, authorId, author, createdAt, updatedAt]
      properties:
        id:
          type: string
        content:
          type: string
          description: Markdown
        taskId:
          type: string
        authorId:
          type: string
        author:
          $ref: "#/components/schemas/User"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateCommentRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    UpdateCommentRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    CommentResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Comment"

    CommentListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Comment"

    # ----- Category -----
    Category:
      type: object
      required: [id, name, color, projectId]
      properties:
        id:
          type: string
        name:
          type: string
        color:
          type: string
          description: "OKLCH カラー値（例: `oklch(0.65 0.17 160)`）"
        projectId:
          type: string

    CreateCategoryRequest:
      type: object
      required: [name, color]
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: string
          minLength: 1

    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: string
          minLength: 1

    CategoryResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Category"

    CategoryListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Category"

    # ----- Attachment -----
    Attachment:
      type: object
      required: [id, fileName, fileUrl, fileSize, mimeType, taskId, uploaderId, createdAt]
      properties:
        id:
          type: string
        fileName:
          type: string
        fileUrl:
          type: string
        fileSize:
          type: integer
          minimum: 0
        mimeType:
          type: string
        taskId:
          type: string
        uploaderId:
          type: string
        createdAt:
          type: string
          format: date-time

    AttachmentResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Attachment"

    # ----- Activity Log -----
    ActivityLog:
      type: object
      required: [id, action, entityType, entityId, userId, projectId, createdAt]
      properties:
        id:
          type: string
        action:
          $ref: "#/components/schemas/ActivityAction"
        entityType:
          type: string
          description: "例: task, comment, project"
        entityId:
          type: string
        userId:
          type: string
        projectId:
          type: string
        oldValue:
          description: 変更前の値（任意の JSON）
        newValue:
          description: 変更後の値（任意の JSON）
        user:
          $ref: "#/components/schemas/User"
        createdAt:
          type: string
          format: date-time

    ActivityLogListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ActivityLog"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # ----- Notification -----
    Notification:
      type: object
      required: [id, type, title, message, isRead, userId, createdAt]
      properties:
        id:
          type: string
        type:
          $ref: "#/components/schemas/NotificationType"
        title:
          type: string
        message:
          type: string
        isRead:
          type: boolean
        userId:
          type: string
        linkUrl:
          type: [string, "null"]
        createdAt:
          type: string
          format: date-time

    NotificationResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Notification"

    NotificationListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        pagination:
          $ref: "#/components/schemas/Pagination"
        unreadCount:
          type: integer
          minimum: 0

    BulkReadResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [updated]
          properties:
            updated:
              type: integer
              description: 既読化した通知件数

    # ----- Search -----
    SearchResultTask:
      type: object
      required: [task, highlights]
      properties:
        task:
          $ref: "#/components/schemas/Task"
        highlights:
          type: array
          description: ハイライト対象フィールドとマッチ箇所
          items:
            type: object
            required: [field, snippet]
            properties:
              field:
                type: string
                enum: [title, description, taskNumber, comment]
              snippet:
                type: string

    SearchResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/SearchResultTask"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # ----- Dashboard -----
    DashboardSummary:
      type: object
      required: [totalTasks, doneTasks, inProgressTasks, overdueTasks]
      properties:
        totalTasks:
          type: integer
          minimum: 0
        doneTasks:
          type: integer
          minimum: 0
        inProgressTasks:
          type: integer
          minimum: 0
        overdueTasks:
          type: integer
          minimum: 0

    DashboardChartPoint:
      type: object
      required: [label, value]
      properties:
        label:
          type: string
        value:
          type: integer

    DashboardResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required:
            - summary
            - statusChart
            - priorityChart
            - completedTrend
            - myTasks
            - dueSoonTasks
            - recentActivities
          properties:
            summary:
              $ref: "#/components/schemas/DashboardSummary"
            statusChart:
              type: array
              description: ステータス別タスク数
              items:
                $ref: "#/components/schemas/DashboardChartPoint"
            priorityChart:
              type: array
              description: 優先度別タスク数
              items:
                $ref: "#/components/schemas/DashboardChartPoint"
            completedTrend:
              type: array
              description: 直近 7 日間の完了タスク数推移
              items:
                $ref: "#/components/schemas/DashboardChartPoint"
            myTasks:
              type: array
              description: 自分にアサインされたタスク上位 5 件
              items:
                $ref: "#/components/schemas/Task"
            dueSoonTasks:
              type: array
              description: 期限が近いタスク上位 5 件
              items:
                $ref: "#/components/schemas/Task"
            recentActivities:
              type: array
              description: 最近のアクティビティ上位 10 件
              items:
                $ref: "#/components/schemas/ActivityLog"

    # ----- Audit Log -----
    AuditLog:
      type: object
      required: [id, action, userId, resource, resourceId, createdAt]
      properties:
        id:
          type: string
        action:
          type: string
        userId:
          type: string
        ipAddress:
          type: [string, "null"]
        userAgent:
          type: [string, "null"]
        resource:
          type: string
        resourceId:
          type: string
        details:
          description: 追加情報（任意の JSON）
        user:
          $ref: "#/components/schemas/User"
        createdAt:
          type: string
          format: date-time

    AuditLogListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AuditLog"
        pagination:
          $ref: "#/components/schemas/Pagination"
